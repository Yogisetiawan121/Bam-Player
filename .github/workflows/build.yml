name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        python build_exe.py
        
    # Note: To make the binary completely standalone on Windows machines without VLC installed,
    # we would need a step here to download libvlc binaries (e.g. from VideoLAN's FTP)
    # and copy libvlc.dll, libvlccore.dll, and the plugins directory into dist/BamPlayer/.
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BamPlayer-Windows
        path: dist/BamPlayer
