<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; media-src 'self' 'unsafe-inline' blob: data:; img-src 'self' data: blob:;">
  <title>NeonWave Player</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/winamp.css">
</head>
<body>

  <!-- Custom Title Bar -->
  <div id="titlebar" class="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-logo">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f0ff" />
              <stop offset="50%" stop-color="#ff00aa" />
              <stop offset="100%" stop-color="#39ff14" />
            </linearGradient>
          </defs>
          <circle cx="12" cy="12" r="10" fill="none" stroke="url(#logo-grad)" stroke-width="1.5" />
          <circle cx="12" cy="12" r="4" fill="url(#logo-grad)" />
        </svg>
      </div>
      <span class="titlebar-text" id="titlebar-text">NeonWave Player</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-classic" title="Toggle Classic Mode">
        <svg viewBox="0 0 16 16" width="14" height="14">
          <rect x="2" y="2" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <line x1="4" y1="8" x2="12" y2="8" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">
        <svg viewBox="0 0 16 16" width="14" height="14">
          <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">
        <svg viewBox="0 0 16 16" width="14" height="14">
          <rect x="3" y="3" width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
      <button class="titlebar-btn titlebar-close" id="btn-close" title="Close">
        <svg viewBox="0 0 16 16" width="14" height="14">
          <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div id="app" class="app">

    <!-- Visualization Area -->
    <div id="visualizer-container" class="visualizer-container">
      <canvas id="visualizer-canvas"></canvas>

      <!-- Album Art Overlay -->
      <div id="album-art-overlay" class="album-art-overlay hidden">
        <div class="album-art-placeholder">
          <svg viewBox="0 0 100 100" width="120" height="120">
            <defs>
              <linearGradient id="note-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f0ff33" />
                <stop offset="100%" stop-color="#ff00aa33" />
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="45" fill="url(#note-grad)" stroke="#ffffff15" stroke-width="1"/>
            <text x="50" y="58" text-anchor="middle" fill="#ffffff44" font-size="30">♪</text>
          </svg>
          <p class="album-art-text">Drop your music here</p>
          <p class="album-art-sub">or press Ctrl+O to open files</p>
        </div>
      </div>

      <!-- Now Playing Overlay -->
      <div id="now-playing" class="now-playing hidden">
        <div class="now-playing-info">
          <span id="now-playing-title" class="now-playing-title">No Track</span>
          <span id="now-playing-artist" class="now-playing-artist">Drop audio files to begin</span>
        </div>
      </div>

      <!-- Visualizer Controls -->
      <div class="viz-selector" id="viz-selector">
        <button class="viz-btn active" data-viz="spectrum" title="Spectrum Analyzer (1)">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <rect x="2" y="10" width="3" height="8" rx="1" fill="currentColor" opacity="0.6"/>
            <rect x="7" y="6" width="3" height="12" rx="1" fill="currentColor" opacity="0.8"/>
            <rect x="12" y="4" width="3" height="14" rx="1" fill="currentColor" opacity="0.7"/>
            <rect x="17" y="8" width="3" height="10" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button class="viz-btn" data-viz="waveform" title="Waveform (2)">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <polyline points="1,10 4,4 7,14 10,6 13,16 16,8 19,10" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="viz-btn" data-viz="circular" title="Circular (3)">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
            <circle cx="10" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
            <circle cx="10" cy="10" r="2" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button class="viz-btn" data-viz="particles" title="Particles (4)">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <circle cx="5" cy="5" r="1.5" fill="currentColor" opacity="0.8"/>
            <circle cx="15" cy="7" r="1" fill="currentColor" opacity="0.6"/>
            <circle cx="10" cy="15" r="1.5" fill="currentColor"/>
            <circle cx="3" cy="14" r="1" fill="currentColor" opacity="0.5"/>
            <circle cx="17" cy="13" r="1.2" fill="currentColor" opacity="0.7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Control Bar -->
    <div id="control-bar" class="control-bar">
      <!-- Playback Controls -->
      <div class="control-group playback-controls">
        <button class="ctrl-btn" id="btn-prev" title="Previous">
          <svg viewBox="0 0 20 20" width="18" height="18">
            <polygon points="16,4 16,16 6,10" fill="currentColor"/>
            <rect x="4" y="4" width="2" height="12" rx="0.5" fill="currentColor"/>
          </svg>
        </button>
        <button class="ctrl-btn ctrl-play" id="btn-play" title="Play (Space)">
          <svg viewBox="0 0 20 20" width="22" height="22" id="play-icon">
            <polygon points="6,3 18,10 6,17" fill="currentColor"/>
          </svg>
          <svg viewBox="0 0 20 20" width="22" height="22" id="pause-icon" class="hidden">
            <rect x="5" y="3" width="3.5" height="14" rx="1" fill="currentColor"/>
            <rect x="11.5" y="3" width="3.5" height="14" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-next" title="Next">
          <svg viewBox="0 0 20 20" width="18" height="18">
            <polygon points="4,4 4,16 14,10" fill="currentColor"/>
            <rect x="14" y="4" width="2" height="12" rx="0.5" fill="currentColor"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-stop" title="Stop">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <rect x="4" y="4" width="12" height="12" rx="2" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <!-- Seek Bar -->
      <div class="control-group seek-group">
        <span class="time-display" id="time-current">0:00</span>
        <div class="seek-bar-container" id="seek-bar-container">
          <div class="seek-bar-track" id="seek-bar-track">
            <div class="seek-bar-progress" id="seek-bar-progress"></div>
            <div class="seek-bar-buffer" id="seek-bar-buffer"></div>
            <div class="seek-bar-thumb" id="seek-bar-thumb"></div>
          </div>
          <div class="seek-bar-hover" id="seek-bar-hover">
            <span id="seek-hover-time">0:00</span>
          </div>
        </div>
        <span class="time-display" id="time-total">0:00</span>
      </div>

      <!-- Volume Control -->
      <div class="control-group volume-group">
        <button class="ctrl-btn" id="btn-mute" title="Mute">
          <svg viewBox="0 0 20 20" width="16" height="16" id="volume-icon">
            <polygon points="4,7 8,7 13,3 13,17 8,13 4,13" fill="currentColor"/>
            <path d="M15,7 Q18,10 15,13" fill="none" stroke="currentColor" stroke-width="1.2" id="volume-wave1"/>
            <path d="M16,5 Q20,10 16,15" fill="none" stroke="currentColor" stroke-width="1" id="volume-wave2"/>
          </svg>
        </button>
        <div class="volume-slider-container">
          <div class="volume-slider-track" id="volume-slider">
            <div class="volume-slider-fill" id="volume-fill"></div>
            <div class="volume-slider-thumb" id="volume-thumb"></div>
          </div>
        </div>
        <span class="volume-percent" id="volume-percent">100%</span>
      </div>

      <!-- Utility Controls -->
      <div class="control-group utility-group">
        <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <path d="M2,14 L5,14 Q8,14 9,11 L11,7 Q12,4 15,4 L18,4" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2,6 L5,6 Q8,6 9,9 L11,13 Q12,16 15,16 L18,16" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="15,2 18,4 15,6" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="15,14 18,16 15,18" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" title="Repeat">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <path d="M4,10 Q4,5 9,5 L11,5" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16,10 Q16,15 11,15 L9,15" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="8,2 11,5 8,8" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <polyline points="12,12 9,15 12,18" fill="none" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-playlist-toggle" title="Toggle Playlist (Ctrl+L)">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <rect x="3" y="4" width="14" height="2" rx="1" fill="currentColor"/>
            <rect x="3" y="9" width="14" height="2" rx="1" fill="currentColor"/>
            <rect x="3" y="14" width="10" height="2" rx="1" fill="currentColor"/>
            <circle cx="16" cy="15" r="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen (F11)">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <polyline points="3,8 3,3 8,3" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="17,12 17,17 12,17" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="8,17 3,17 3,12" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="12,3 17,3 17,8" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Playlist Panel -->
    <div id="playlist-panel" class="playlist-panel hidden">
      <div class="playlist-header">
        <span class="playlist-title">
          <svg viewBox="0 0 16 16" width="14" height="14">
            <rect x="2" y="3" width="12" height="1.5" rx="0.5" fill="currentColor"/>
            <rect x="2" y="7" width="8" height="1.5" rx="0.5" fill="currentColor" opacity="0.7"/>
            <rect x="2" y="11" width="10" height="1.5" rx="0.5" fill="currentColor" opacity="0.5"/>
          </svg>
          Playlist
        </span>
        <span class="playlist-count" id="playlist-count">0 tracks</span>
        <div class="playlist-header-actions">
          <button class="playlist-action-btn" id="btn-add-files" title="Add Files">
            <svg viewBox="0 0 16 16" width="14" height="14">
              <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.5"/>
              <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
          <button class="playlist-action-btn" id="btn-add-folder" title="Add Folder">
            <svg viewBox="0 0 16 16" width="14" height="14">
              <path d="M2,4 L6,4 L7.5,5.5 L14,5.5 Q14.5,5.5 14.5,6 L14.5,12 Q14.5,12.5 14,12.5 L2,12.5 Q1.5,12.5 1.5,12 L1.5,4.5 Q1.5,4 2,4Z" fill="none" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
          <button class="playlist-action-btn playlist-action-danger" id="btn-clear-playlist" title="Clear Playlist">
            <svg viewBox="0 0 16 16" width="14" height="14">
              <line x1="3" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="1.5"/>
              <line x1="13" y1="3" x2="3" y2="13" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="playlist-search">
        <svg viewBox="0 0 16 16" width="12" height="12" class="search-icon">
          <circle cx="6.5" cy="6.5" r="4" fill="none" stroke="currentColor" stroke-width="1.2"/>
          <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <input type="text" id="playlist-search-input" class="playlist-search-input" placeholder="Filter tracks..." />
      </div>
      <div class="playlist-items" id="playlist-items">
        <div class="playlist-empty">
          <svg viewBox="0 0 40 40" width="32" height="32">
            <circle cx="20" cy="20" r="16" fill="none" stroke="#ffffff15" stroke-width="1.5"/>
            <text x="20" y="25" text-anchor="middle" fill="#ffffff20" font-size="16">♪</text>
          </svg>
          <span>No tracks in playlist</span>
          <span class="playlist-empty-hint">Drop audio files or click + to add</span>
        </div>
      </div>
    </div>

    <!-- Drop Zone Overlay -->
    <div id="drop-overlay" class="drop-overlay hidden">
      <div class="drop-overlay-content">
        <svg viewBox="0 0 60 60" width="48" height="48">
          <circle cx="30" cy="30" r="26" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <line x1="30" y1="15" x2="30" y2="45" stroke="currentColor" stroke-width="2"/>
          <line x1="15" y1="30" x2="45" y2="30" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>Drop Audio Files</span>
      </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
      <div class="context-menu-item" data-action="play">Play</div>
      <div class="context-menu-item" data-action="remove">Remove from Playlist</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="reveal">Show in Folder</div>
      <div class="context-menu-item" data-action="properties">Properties</div>
    </div>

  </div>

  <script src="utils/store.js"></script>
  <script src="utils/audio.js"></script>
  <script src="utils/keybindings.js"></script>
  <script src="visualizers/base.js"></script>
  <script src="visualizers/spectrum.js"></script>
  <script src="visualizers/waveform.js"></script>
  <script src="visualizers/circular.js"></script>
  <script src="visualizers/particles.js"></script>
  <script src="components/titlebar.js"></script>
  <script src="components/controls.js"></script>
  <script src="components/playlist.js"></script>
  <script src="app.js"></script>
</body>
</html>
